const { useState } = React;

function QuizApp() {
  const [idx, setIdx] = useState(0);
  const [answers, setAnswers] = useState({});
  const [showFeedback, setShowFeedback] = useState(false);
  const [inputVal, setInputVal] = useState("");
  const [done, setDone] = useState(false);

  const total = quizData.questions.length;
  const q = quizData.questions[idx];
  const progress = (idx / total) * 100;

  const check = (user, correct) =>
    user.trim().replace(/\s+/g,"").toLowerCase() === correct.trim().replace(/\s+/g,"").toLowerCase();

  const isCorrect = (qid) => {
    const q = quizData.questions.find(x => x.id === qid);
    const ans = answers[qid];
    if (!ans) return false;
    if (q.type === "multiple_choice") return ans === q.answer;
    if (q.type === "ox") return ans.toUpperCase() === q.answer;
    return check(ans, q.answer);
  };

  const handleSubmit = (val) => {
    if (!val) return;
    setAnswers(p => ({...p, [q.id]: val}));
    setShowFeedback(true);
  };

  const handleNext = () => {
    if (idx + 1 >= total) { setDone(true); return; }
    setIdx(i => i+1);
    setShowFeedback(false);
    setInputVal("");
  };

  const typeBadge = (type) => {
    const map = {
      multiple_choice: { label:"객관식", bg:"#dbeafe", color:"#1e40af" },
      short_answer: { label:"단답형", bg:"#ede9fe", color:"#5b21b6" },
      ox: { label:"OX", bg:"#ffedd5", color:"#9a3412" }
    };
    const s = map[type];
    return `<span style="font-size:12px;font-weight:500;padding:2px 10px;border-radius:999px;background:${s.bg};color:${s.color}">${s.label}</span>`;
  };

  const downloadCSV = () => {
    const BOM = "\uFEFF";
    const header = "Front,Back,Tags\n";
    const tag = quizData.title.replace(/\s+/g,"");
    const rows = quizData.questions.map(q => {
      const typeTag = q.type==="multiple_choice"?"객관식":q.type==="short_answer"?"단답형":"OX";
      let front = q.question;
      if (q.type==="multiple_choice") front += "<br><br>" + q.options.join("<br>");
      else if (q.type==="ox") front += " (O/X)";
      const back = `${q.answer} — ${q.explanation}`;
      return `"${front.replace(/"/g,'""')}","${back.replace(/"/g,'""')}","${tag} ${typeTag}"`;
    }).join("\n");
    const blob = new Blob([BOM+header+rows], {type:"text/csv;charset=utf-8;"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href=url; a.download=`${quizData.title}_Anki.csv`; a.click();
    URL.revokeObjectURL(url);
  };

  const scoreCount = quizData.questions.filter(q => isCorrect(q.id)).length;

  if (done) {
    const pct = Math.round((scoreCount/total)*100);
    const wrong = quizData.questions.filter(q => !isCorrect(q.id));
    return React.createElement("div", {style:{padding:"1.5rem 0"}},
      React.createElement("div", {style:{textAlign:"center",marginBottom:"1.5rem"}},
        React.createElement("div", {style:{fontSize:48,fontWeight:500,color:pct>=70?"#22c55e":pct>=40?"#f59e0b":"#ef4444"}}, `${pct}%`),
        React.createElement("div", {style:{fontSize:16,color:"var(--color-text-secondary)",marginTop:4}}, `${total}문제 중 ${scoreCount}개 정답`),
        React.createElement("div", {style:{fontSize:13,color:"var(--color-text-tertiary)",marginTop:2}}, quizData.title)
      ),
      React.createElement("button", {onClick:downloadCSV,style:{display:"block",margin:"0 auto 1.5rem",padding:"8px 20px",fontSize:13,cursor:"pointer",borderRadius:"var(--border-radius-md)",border:"0.5px solid var(--color-border-secondary)",background:"var(--color-background-primary)",color:"var(--color-text-primary)"}}, "Anki CSV 다운로드 ↓"),
      wrong.length > 0 && React.createElement("div", null,
        React.createElement("div", {style:{fontSize:13,fontWeight:500,color:"var(--color-text-secondary)",marginBottom:"0.75rem"}}, `틀린 문제 복습 (${wrong.length}개)`),
        wrong.map(wq => React.createElement("div", {key:wq.id,style:{background:"var(--color-background-secondary)",borderRadius:"var(--border-radius-md)",padding:"12px 14px",marginBottom:8,fontSize:14}},
          React.createElement("div", {style:{fontWeight:500,marginBottom:4}}, `Q${wq.id}. ${wq.question}`),
          React.createElement("div", {style:{color:"#22c55e",fontSize:13}}, `정답: ${wq.answer}`),
          React.createElement("div", {style:{color:"var(--color-text-secondary)",fontSize:12,marginTop:4}}, wq.explanation)
        ))
      ),
      React.createElement("button", {onClick:()=>{setIdx(0);setAnswers({});setShowFeedback(false);setInputVal("");setDone(false);},style:{display:"block",margin:"1.5rem auto 0",padding:"8px 24px",cursor:"pointer",borderRadius:"var(--border-radius-md)",border:"0.5px solid var(--color-border-secondary)",background:"var(--color-background-primary)",color:"var(--color-text-primary)",fontSize:14}}, "처음부터 다시")
    );
  }

  const curAns = answers[q.id];

  return React.createElement("div", {style:{padding:"1rem 0"}},
    React.createElement("div", {style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}},
      React.createElement("div", {dangerouslySetInnerHTML:{__html: typeBadge(q.type)}}),
      React.createElement("span", {style:{fontSize:13,color:"var(--color-text-secondary)"}}, `${idx+1} / ${total}`)
    ),
    React.createElement("div", {style:{height:4,background:"var(--color-background-secondary)",borderRadius:999,marginBottom:"1.25rem",overflow:"hidden"}},
      React.createElement("div", {style:{height:"100%",width:`${progress}%`,background:"#3b82f6",borderRadius:999,transition:"width 0.3s"}})
    ),
    React.createElement("div", {style:{fontSize:16,fontWeight:500,marginBottom:"1.25rem",lineHeight:1.6}}, `Q${q.id}. ${q.question}`),

    q.type === "multiple_choice" && React.createElement("div", null,
      q.options.map(opt => {
        const val = opt[0];
        const selected = curAns === val;
        const correct = showFeedback && val === q.answer;
        const wrong = showFeedback && selected && val !== q.answer;
        return React.createElement("button", {
          key:val,
          onClick:()=>{ if(!showFeedback) handleSubmit(val); },
          style:{
            display:"block",width:"100%",textAlign:"left",padding:"10px 14px",marginBottom:8,
            borderRadius:"var(--border-radius-md)",cursor:showFeedback?"default":"pointer",
            border:`0.5px solid ${correct?"#22c55e":wrong?"#ef4444":"var(--color-border-secondary)"}`,
            background:correct?"#f0fdf4":wrong?"#fef2f2":selected?"var(--color-background-secondary)":"var(--color-background-primary)",
            fontSize:14,color:"var(--color-text-primary)",transition:"all 0.2s"
          }
        }, opt);
      })
    ),

    q.type === "short_answer" && !showFeedback && React.createElement("div", null,
      React.createElement("input", {
        type:"text", value:inputVal, onChange:e=>setInputVal(e.target.value),
        onKeyDown:e=>{ if(e.key==="Enter") handleSubmit(inputVal); },
        placeholder:"답을 입력하세요...",
        style:{width:"100%",padding:"10px 14px",fontSize:14,borderRadius:"var(--border-radius-md)",border:"0.5px solid var(--color-border-secondary)",background:"var(--color-background-primary)",color:"var(--color-text-primary)",boxSizing:"border-box"}
      }),
      React.createElement("button", {
        onClick:()=>handleSubmit(inputVal),
        style:{marginTop:8,padding:"8px 20px",fontSize:14,cursor:"pointer",borderRadius:"var(--border-radius-md)",border:"0.5px solid var(--color-border-secondary)",background:"var(--color-background-primary)",color:"var(--color-text-primary)"}
      }, "제출")
    ),

    q.type === "short_answer" && showFeedback && React.createElement("div", {style:{padding:"10px 14px",borderRadius:"var(--border-radius-md)",border:`0.5px solid ${isCorrect(q.id)?"#22c55e":"#ef4444"}`,background:isCorrect(q.id)?"#f0fdf4":"#fef2f2",fontSize:14}},
      React.createElement("span", {style:{color:"var(--color-text-secondary)"}}, "내 답변: "),
      React.createElement("span", {style:{fontWeight:500}}, curAns)
    ),

    q.type === "ox" && !showFeedback && React.createElement("div", {style:{display:"flex",gap:12}},
      ["O","X"].map(v => React.createElement("button", {
        key:v, onClick:()=>handleSubmit(v),
        style:{flex:1,padding:"16px",fontSize:24,fontWeight:500,cursor:"pointer",borderRadius:"var(--border-radius-md)",border:"0.5px solid var(--color-border-secondary)",background:"var(--color-background-primary)",color:v==="O"?"#22c55e":"#ef4444"}
      }, v))
    ),

    q.type === "ox" && showFeedback && React.createElement("div", {style:{display:"flex",gap:12}},
      ["O","X"].map(v => {
        const correct = v === q.answer;
        const selected = curAns === v;
        return React.createElement("div", {
          key:v,
          style:{flex:1,padding:"16px",fontSize:24,fontWeight:500,textAlign:"center",borderRadius:"var(--border-radius-md)",border:`0.5px solid ${correct?"#22c55e":selected?"#ef4444":"var(--color-border-tertiary)"}`,background:correct?"#f0fdf4":selected?"#fef2f2":"var(--color-background-secondary)",color:v==="O"?"#22c55e":"#ef4444"}
        }, v);
      })
    ),

    showFeedback && React.createElement("div", {style:{marginTop:"1rem",padding:"12px 14px",borderRadius:"var(--border-radius-md)",background:isCorrect(q.id)?"#f0fdf4":"#fef2f2",border:`0.5px solid ${isCorrect(q.id)?"#22c55e":"#ef4444"}`}},
      React.createElement("div", {style:{fontWeight:500,color:isCorrect(q.id)?"#15803d":"#b91c1c",fontSize:14,marginBottom:4}}, isCorrect(q.id)?"정답입니다!":"오답"),
      !isCorrect(q.id) && q.type !== "ox" && React.createElement("div", {style:{fontSize:13,color:"#15803d",marginBottom:4}}, `정답: ${q.answer}`),
      !isCorrect(q.id) && q.type === "ox" && React.createElement("div", {style:{fontSize:13,color:"#15803d",marginBottom:4}}, `정답: ${q.answer}`),
      React.createElement("div", {style:{fontSize:13,color:"var(--color-text-secondary)"}}, q.explanation)
    ),

    React.createElement("div", {style:{marginTop:"1.25rem",display:"flex",justifyContent:"space-between",alignItems:"center"}},
      React.createElement("button", {onClick:downloadCSV,style:{fontSize:12,padding:"6px 14px",cursor:"pointer",borderRadius:"var(--border-radius-md)",border:"0.5px solid var(--color-border-tertiary)",background:"var(--color-background-secondary)",color:"var(--color-text-secondary)"}}, "Anki CSV ↓"),
      showFeedback && React.createElement("button", {
        onClick:handleNext,
        style:{padding:"8px 24px",fontSize:14,cursor:"pointer",borderRadius:"var(--border-radius-md)",border:"0.5px solid var(--color-border-secondary)",background:"var(--color-background-primary)",color:"var(--color-text-primary)",fontWeight:500}
      }, idx+1 >= total ? "결과 보기" : "다음 문제 →")
    )
  );
}

ReactDOM.render(React.createElement(QuizApp), document.getElementById("root"));
</script>
